<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Villa Interior – Living Room</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"/>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

</head>

<body>

<div id="panorama"></div>

<div class="space-bar">
Living Room – Villa Interior
</div>


<div class="ui-buttons">

<button onclick="toggleGyro()" title="AR Mode">📱</button>

<button onclick="enterVR()" title="VR Mode">🥽</button>

<button onclick="openFullscreen()" title="Fullscreen">⛶</button>

</div>




  <script>

var viewer = pannellum.viewer('panorama', {
"type": "equirectangular",
"panorama": "LIV27.png",
"autoLoad": true,
"friction": 0.5,
"showFullscreenCtrl": false
});


function openFullscreen() {

var elem = document.getElementById("panorama");

if (elem.requestFullscreen) {
elem.requestFullscreen();
} else if (elem.webkitRequestFullscreen) {
elem.webkitRequestFullscreen();
} else if (elem.msRequestFullscreen) {
elem.msRequestFullscreen();
}

}



function toggleGyro() {

if (viewer.isOrientationActive()) {
viewer.stopOrientation();
}
else {

if (typeof DeviceOrientationEvent !== "undefined" &&
typeof DeviceOrientationEvent.requestPermission === "function") {

DeviceOrientationEvent.requestPermission()
.then(function(response) {
if (response == "granted") {
viewer.startOrientation();
}
})
.catch(console.error);

}
else {

viewer.startOrientation();

}

}

}



function enterVR() {

openFullscreen();
toggleGyro();

}

</script>
  
</body>

</html>
